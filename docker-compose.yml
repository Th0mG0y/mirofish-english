services:
  neo4j:
    image: neo4j:5.26
    container_name: mirofish-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/password
      - NEO4J_PLUGINS=["apoc"]
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    restart: unless-stopped

  mirofish:
    image: ghcr.io/666ghj/mirofish:latest
    # Mirror accelerator (replace the above address if pulling is slow)
    # image: ghcr.nju.edu.cn/666ghj/mirofish:latest
    container_name: mirofish
    env_file:
      - .env
    ports:
      - "3000:3000"
      - "5001:5001"
    restart: unless-stopped
    depends_on:
      - neo4j
    volumes:
      - ./backend/uploads:/app/backend/uploads

volumes:
  neo4j_data:
  neo4j_logs: